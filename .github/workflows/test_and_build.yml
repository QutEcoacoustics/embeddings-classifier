name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyarrow pytest pytest-cov pytest-mock

      - name: Install package
        run: |
          pip install -e .
          python -c "import embeddings_classifier.app"

      - name: "Run unit tests (fork PR: exclude auth integration)"
        if: "github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork"
        run: |
          pytest tests/unit/ -v -m "not auth_integration"

      - name: "Run unit tests (trusted: include auth integration)"
        if: "github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork"
        env:
          BAW_AUTH_TOKEN: ${{ secrets.BAW_AUTH_TOKEN }}
        run: |
          bash scripts/test_tokens.sh
          pytest tests/unit/ -v
      
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install pytest for host integration tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pandas
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: parquet-processor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test built image (no mounts)
        run: |
          docker run --rm parquet-processor:latest version
      
      - name: "Unit Test in Docker container (fork PR: exclude auth integration)"
        if: "github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork"
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -v ${{ github.workspace }}/tests:/app/tests \
            --entrypoint python \
            parquet-processor:latest \
            -m pytest tests/unit/ -v -m "not auth_integration"

      - name: "Unit Test in Docker container (trusted: include auth integration)"
        if: "github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork"
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -e BAW_AUTH_TOKEN="${{ secrets.BAW_AUTH_TOKEN }}" \
            -v ${{ github.workspace }}/tests:/app/tests \
            --entrypoint python \
            parquet-processor:latest \
            -m pytest tests/unit/ -v

      - name: Integration Test from host
        run: |
          pytest -c pytest.host.ini -m docker tests/docker/test_docker_integration.py
