name: Manual Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run preflight only (no commit/tag/release)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  ECOSOUNDS_API_TOKEN: ${{ secrets.ECOSOUNDS_API_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute new version (and check for changes)
        id: version
        run: |
          version="$(bash scripts/get_version.sh)"
          if [ -z "${version}" ]; then
            echo "No releasable changes since last release (ignoring src/VERSION). Exiting."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "new_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Update package version file
        if: steps.version.outputs.changed == 'true'
        run: |
          echo "${{ steps.version.outputs.new_version }}" > src/VERSION

      - name: Validate API token (fail fast)
        if: steps.version.outputs.changed == 'true'
        run: |
          bash scripts/test_tokens.sh

      - name: Set up Python
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Preflight install and tests
        if: steps.version.outputs.changed == 'true'
        env:
          BAW_AUTH_TOKEN: ${{ secrets.ECOSOUNDS_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyarrow pytest pytest-cov pytest-mock
          pip install -e .
          python -c "import embeddings_classifier.app"
          pytest tests/unit/ -v

      - name: Commit package version file
        if: steps.version.outputs.changed == 'true' && github.ref_name == 'main' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/VERSION
          git commit -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Tag and push release tag
        if: steps.version.outputs.changed == 'true' && github.ref_name == 'main' && !inputs.dry_run
        run: |
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true' && github.ref_name == 'main' && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: true

      - name: Dry-run summary
        if: steps.version.outputs.changed == 'true' && github.ref_name == 'main' && inputs.dry_run
        run: |
          echo "Dry-run mode: preflight completed; commit/tag/release steps were intentionally skipped."

      - name: Warn when run outside main
        if: steps.version.outputs.changed == 'true' && github.ref_name != 'main'
        run: |
          echo "Release write steps are skipped because this workflow run is on ref '${GITHUB_REF_NAME}', not 'main'."
